name: memovault
description: MemoVault — Your secure personal vault.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: 3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  get: 4.6.6
  flutter_secure_storage: 9.2.2
  shared_preferences: 2.3.2
  path_provider: 2.1.5
  drift: ^2.31.0
  sqflite_sqlcipher: ^3.4.0
  drift_sqflite: ^2.0.1
  crypto: ^3.0.7
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  flutter_flavorizr: 2.2.3
  build_runner: ^2.15.0
  shared_preferences_platform_interface: 2.4.0
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true

flavorizr:
  app:
    android:
      flavorDimensions: "flavor-type"
    ios: {}

  flavors:
    dev:
      app:
        name: "MemoVault Dev"
      android:
        applicationId: "com.memovault.dev"
        icon: "assets/icons/icon_dev.png"
      ios:
        bundleId: "com.memovault.dev"
        icon: "assets/icons/icon_dev.png"

    staging:
      app:
        name: "MemoVault Staging"
      android:
        applicationId: "com.memovault.staging"
        icon: "assets/icons/icon_staging.png"
      ios:
        bundleId: "com.memovault.staging"
        icon: "assets/icons/icon_staging.png"

    prod:
      app:
        name: "MemoVault"
      android:
        applicationId: "com.memovault"
        icon: "assets/icons/icon_prod.png"
      ios:
        bundleId: "com.memovault"
        icon: "assets/icons/icon_prod.png"
